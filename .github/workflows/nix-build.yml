name: "Code quality"
on:
  pull_request:
  push:
jobs:
  flake_check:
    runs-on: [ ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check --all-systems
  statix_check:
    needs: flake_check
    runs-on: [ ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop -c task nix:statix
  system-dry-build:
    needs: flake_check
    runs-on: [ ubuntu-24.04 ]
    steps:
    - uses: actions/checkout@v5
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - run: nix develop -c task build:wheatley
    - run: nix develop -c task build:hetz01