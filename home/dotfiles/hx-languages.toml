[language-server.typos]
command = "typos-lsp"

[[language]]
name = "markdown"
language-servers = ["marksman", "typos"]

[language-server.gopls]
command = "gopls"
args = ["serve"]

[language-server.gopls.config]
"ui.diagnostic.staticcheck" = true
gofumpt = true

[[language]]
name = "go"
auto-format = true
language-servers = ["gopls"]
formatter = { command = "gofmt" }
